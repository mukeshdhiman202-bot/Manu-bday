<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Manu ❤️</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ff4b91,#6a5cff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
text-align:center;
color:white;
padding:20px;
}

img{
width:220px;
height:220px;
border-radius:50%;
object-fit:cover;
border:6px solid white;
box-shadow:0 0 25px white;
margin-bottom:20px;
}

h1{
font-size:40px;
margin:10px 0;
}

p{
font-size:22px;
margin:20px 0;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
color:#ff0066;
font-weight:bold;
cursor:pointer;
}

.heart{
position:absolute;
font-size:25px;
animation:fall 5s linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-100px);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}
</style>
</head>

<body>

<div class="container">

<img src="IMG_20260627_164339.jpg">

<h1>🎂 Happy Birthday Manu ❤️</h1>

<p id="text"></p>

<button onclick="playMusic()">🎵 Tap Here</button>

<audio id="song">
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

</div>

<script>

const msg="Happy Birthday Meri Jaan ❤️\nTum meri duniya ho.\nHamesha khush raho.\nI Love You Forever ❤️";

let i=0;

function type(){
if(i<msg.length){
document.getElementById("text").innerHTML+=msg.charAt(i);
i++;
setTimeout(type,70);
}
}

type();

function playMusic(){
document.getElementById("song").play();
}

setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

},300);

</script>

</body>
</html>
